services:
  postgres:
    image: postgres:16-alpine
    container_name: harmonia-postgres
    environment:
      POSTGRES_USER: harmonia
      POSTGRES_PASSWORD: harmonia
      POSTGRES_DB: harmonia
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmonia -d harmonia"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://harmonia:harmonia@postgres:5432/harmonia
      PORT: 4000
      WEB_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
